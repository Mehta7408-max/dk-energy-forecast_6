name: Daily Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data ingestion
        run: python -c "from src.data_ingestion import run_ingestion; run_ingestion(days_back=7)"

      - name: Train model
        run: python -c "from src.train_model import train_model; train_model()"

      - name: Run drift detection
        run: python -c "from src.monitor import check_data_drift; check_data_drift()"

      - name: Commit updated artifacts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add artifacts/ data/ || true
          git diff --staged --quiet || git commit -m "Auto-update: daily pipeline artifacts"
          git push || true

      - name: Run tests
        run: pytest tests/ -v

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts-${{ github.run_number }}
          path: |
            artifacts/latest_metrics.json
            artifacts/feature_importance.json
            artifacts/latest_drift_report.json
          retention-days: 30
